{% extends 'base.html' %}

{% block content %}
<div class="container wrapper flex-grow-1">
  <h1 class="my-4">Изменение задачи</h1>
  
  <form method="post">
    {% csrf_token %}    
    <div class="mb-3">
      <label class="form-label" for="id_name">Имя</label>
      <input type="text" name="name" maxlength="150" class="form-control" placeholder="Имя" required="" id="id_name" value="{{ task.name }}">
    </div>
    
    <div class="mb-3">
      <label class="form-label" for="id_description">Описание</label>
      <textarea name="description" cols="40" rows="10" class="form-control" placeholder="Описание" id="id_description">{{ task.description }}</textarea>
    </div>
    
    <div class="mb-3">
      <label class="form-label" for="id_status">Статус</label>
      <select name="status" class="form-select" required="" id="id_status">
        <option value="" selected="">---------</option>
        {% for status in statuses %}
          <option value="{{ status.id }}" {% if task.status.id == status.id %}selected{% endif %}>{{ status.name }}</option>
        {% endfor %}
      </select>
    </div>
    
    <div class="mb-3">
      <label class="form-label" for="id_executor">Исполнитель</label>
      <select name="executor" class="form-select" id="id_executor">
        <option value="" selected="">---------</option>
        {% for executor in executors %}
          <option value="{{ executor.id }}" {% if task.executor.id == executor.id %}selected{% endif %}>{{ executor.first_name }} {{ executor.last_name }}</option>
        {% endfor %}
      </select>
    </div>
    
    <div class="mb-3">
      <label class="form-label" for="id_labels">Метки</label>
      <select name="labels" class="form-select" id="id_labels" multiple size="5">
        {% for label in labels %}
        <option value="{{ label.id }}" 
            {% if label in task.labels.all %}selected{% endif %}>
            {{ label.name }}
        </option>
        {% endfor %}
      </select>
    </div>
    
    <input class="btn btn-primary" type="submit" value="Изменить">
  </form>
</div>
{% endblock %}
