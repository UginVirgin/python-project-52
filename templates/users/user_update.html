{% extends 'base.html' %}

{% block content %}
<div class="container wrapper flex-grow-1">
    <h1 class="my-4">Редактирование пользователя</h1>

    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="id_username" class="form-label">Имя пользователя</label>
            <input type="text" 
                   name="username" 
                   id="id_username" 
                   class="form-control" 
                   value="{{ user.username }}" 
                   required>
        </div>
        
        <div class="mb-3">
            <label for="id_first_name" class="form-label">Имя</label>
            <input type="text" 
                   name="first_name" 
                   id="id_first_name" 
                   class="form-control" 
                   value="{{ user.first_name|default:'' }}">
        </div>
        
        <div class="mb-3">
            <label for="id_last_name" class="form-label">Фамилия</label>
            <input type="text" 
                   name="last_name" 
                   id="id_last_name" 
                   class="form-control" 
                   value="{{ user.last_name|default:'' }}">
        </div>
        
        <div class="mb-3">
            <label for="id_password" class="form-label">Пароль</label>
            <input type="password" 
                   name="password" 
                   id="id_password" 
                   class="form-control">
            <small class="form-text text-muted">Оставьте пустым, если не хотите менять пароль</small>
        </div>
        
        <div class="mb-3">
            <label for="id_password_confirm" class="form-label">Подтверждение пароля</label>
            <input type="password" 
                   name="password_confirm" 
                   id="id_password_confirm" 
                   class="form-control">
        </div>
        
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Изменить</button>
            <a href="{% url 'users:users' %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
