{% extends 'base.html' %}

{% block title %}
    {% if label %}Редактировать метку{% else %}Создать метку{% endif %}
{% endblock %}

{% block content %}
<div class="container wrapper flex-grow-1">
    <h1 class="my-4">
        {% if label %}
            Редактирование метки
        {% else %}
            Создание метки
        {% endif %}
    </h1>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="name" class="form-label">Имя</label>
            <input type="text" 
                   name="name" 
                   class="form-control" 
                   value="{{ label.name }}"
            >
        </div>
        
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">
                {% if label %}Сохранить{% else %}Создать{% endif %}
            </button>
            <a href="{% url 'labels:label_list' %}" class="btn btn-secondary ms-2">
                Отмена
            </a>
        </div>
    </form>
</div>
{% endblock %}
