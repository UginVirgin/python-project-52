{% extends 'base.html' %}

{% block title %}Создать метку{% endblock %}

{% block content %}
<div class="container wrapper flex-grow-1">
  <h1 class="my-4">Создать метку</h1>   
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label" for="id_name">Имя</label>
      <input type="text" 
             name="name" 
             maxlength="100" 
             class="form-control {% if error_name %}is-invalid{% endif %}" 
             placeholder="Имя" 
             required="" 
             id="id_name"
             value="{{ form_data.name|default:'' }}">
      {% if error_name %}
        <div class="invalid-feedback">
          {{ error_name }}
        </div>
      {% endif %}
    </div>
    <input class="btn btn-primary" type="submit" value="Создать">
  </form>
</div>
{% endblock %}
