services:
  - type: web
    name: task-manager
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn task_manager.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"