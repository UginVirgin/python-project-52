# Обязательные параметры проекта
sonar.projectKey=python-project-52
sonar.projectName=Python Project 52
sonar.projectVersion=1.0

# Корень проекта и кодировка
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Версия Python
sonar.python.version=3.13

# Путь к отчету о покрытии тестами (ВАЖНО!)
sonar.python.coverage.reportPaths=coverage.xml

# Исключаем из анализа ненужные папки и файлы
sonar.exclusions=**/migrations/**, **/venv/**, **/.venv/**, **/__pycache__/**, **/*.pyc, **/settings.py, **/wsgi.py, **/asgi.py

# Тестовые файлы (не влияют на качество кода)
sonar.test.exclusions=**/tests/**, **/test_*.py
sonar.tests=tests

# Дополнительные настройки для Python
sonar.python.pylint.reportPaths=pylint-report.txt

# Настройки для дублирования кода
sonar.cpd.exclusions=**/migrations/**, **/tests/**